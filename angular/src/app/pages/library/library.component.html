<div class="main-section">
  <div
    class="header h-15 flex items-center justify-between px-4 border-b border-base-300"
  >
    <div class="text-4xl">Library</div>
    <div class="flex items-center gap-2">
      <button
        type="button"
        [disabled]="!(this._libraryService.hasCurrentDirectory$ | async)"
        class="btn"
        (click)="this._libraryService.refreshGamesFiles()"
      >
        <i-lucide name="refresh-cw" size="18"></i-lucide>Refresh
      </button>
      <button
        type="button"
        class="btn"
        [attr.aria-pressed]="viewMode === 'list'"
        [title]="viewMode === 'grid' ? 'Switch to list view' : 'Switch to grid view'"
        (click)="toggleViewMode()"
      >
        <i-lucide
          [name]="viewMode === 'grid' ? 'list' : 'layout-grid'"
          size="18"
        ></i-lucide
        >{{ viewMode === "grid" ? "List View" : "Grid View" }}
      </button>
      <label class="select select-bordered w-56">
        <span class="label">Sort</span>
        <select #sortSelect [value]="sortMode" (change)="setSortMode(sortSelect.value)">
          <option value="title-asc">Game Name (A-Z)</option>
          <option value="title-desc">Game Name (Z-A)</option>
          <option value="gameId-asc">Game ID (A-Z)</option>
          <option value="gameId-desc">Game ID (Z-A)</option>
        </select>
      </label>
      @if(this._libraryService.hasCurrentDirectory$ | async) {
      <div class="dropdown dropdown-end">
        <div tabindex="0" role="button" class="btn">
          <i-lucide name="ellipsis"></i-lucide>
        </div>
        <ul
          tabindex="-1"
          class="dropdown-content menu bg-base-100 rounded-box z-1 w-52 p-2 shadow-sm"
        >
          <li>
            <a (click)="this._libraryService.downloadAllArt()"
              ><i-lucide name="download" [size]="16"></i-lucide>Download Artwork
              for All Games</a
            >
          </li>
        </ul>
      </div>
      }
    </div>
  </div>
  <div role="tablist" class="tabs tabs-border px-4 pt-2">
    <a
      role="tab"
      class="tab"
      [class.tab-active]="isActive('PS2')"
      (click)="setTab('PS2')"
      >PS2 <span class="badge badge-sm ml-2">{{ ps2Count$ | async }}</span></a
    >
    <a
      role="tab"
      class="tab"
      [class.tab-active]="isActive('PS1')"
      (click)="setTab('PS1')"
      >PS1 <span class="badge badge-sm ml-2">{{ ps1Count$ | async }}</span></a
    >
  </div>
  <div
    class="library-body p-4 overflow-y-scroll"
    [class.library-grid]="viewMode === 'grid'"
    [class.library-list]="viewMode === 'list'"
  >
    @for (item of visibleGames$ | async; track item.gameId) {
    <app-gamecard
      [game]="item"
      [viewMode]="viewMode"
      [class.list-card]="viewMode === 'list'"
    ></app-gamecard>
    }
  </div>
</div>
